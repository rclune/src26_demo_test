name: tests

on: [push, pull_request, workflow_dispatch]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install project and dev dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest
